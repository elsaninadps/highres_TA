  #   num_threads: [0 10]
  #   early_stopping_round: [0 10]  
  #   early_stopping_min_delta: [0.0]
  #   first_metric_only: [false]


    

- model_name: "RandomForest"
  param_grid:
    n_estimators: [ 100 ]
    max_depth: [ None 20 ]
    min_samples_leaf: [ 10 ]
    max_features: ['sqrt', 'log2']
    max_leaf_nodes: [None]
    max_sample: [None]
    min_sample_split:  # minimum number of samples required to split and internal node


