fname_data_parquet: data/training/GLODAPv2023-raw_collocated-{y}.pq
yname_target: talk
xname_features:
- salinity
- temperature
- nitrate
- bottomdepth
num_cv_folds: 5


params:

- model_name: "CatBoost"
  default_kwargs: { train_dir: models/catboost_cv_train_info }
  param_grid:
    depth: [4, 6, 8]
    learning_rate: [0.01, 0.03, 0.1]
    n_estimators: [300, 600, 1000]
    l2_leaf_reg: [1, 3, 5, 7]
    bagging_temperature: [0, 1, 3]
    border_count: [64, 128]
    random_strength: [1, 5, 10]
    #early_stopping_rounds: [10]
    #early_stopping_min_delta: [0.0]
    #subsample: [0.7, 0.9, 1.0]
    loss_function= ['RMSE'. 'RMSEWithUncertainty']

#maybe do a CatboostUncert and CatboostGBM model with bagging_method set to MVS?

- model_name: "LightGBM"
  param_grid: 
      num_leaves: [15, 31, 63]
      max_depth: [-1, 6, 10]
      
      learning_rate: [0.01, 0.03, 0.1]
      
      n_estimators: [500, 1000, 2000]
      
      min_child_samples: [10, 20, 50]
      subsample: [0.7, 0.9, 1.0]
      colsample_bytree: [0.7, 0.9, 1.0]
      
      reg_alpha: [0, 0.1, 1]
      reg_lambda: [0, 1, 5]


  # param_grid:

  #   n_estimators: [100]
