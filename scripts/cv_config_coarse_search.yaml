fname_data_parquet: data/training/GLODAPv2023-raw_collocated-{y}.pq
yname_target: talk
xname_features:
- salinity
- temperature
- bottomdepth
- mld_dens_soda
- ssh_adt
- ssh_sla
- chl_globcolour
num_cv_folds: 5
num_best_models_cohort: 4
save_path: "outputs/model_selection/first_coarse_search"


params:


- model_name: "RandomForest"
  param_grid: 
    n_estimators: [500, 1000]
    max_depth: [30, 100]
    min_samples_leaf: [2, 5]
    max_features: ["sqrt"]


- model_name: "CatBoost"
  #default_kwargs: { train_dir: models/catboost_cv_train_info }
  param_grid:
    depth: [6, 10]
    learning_rate: [0.03, 0.1]
    n_estimators: [500, 1000]
    #l2_leaf_reg: [1, 5, 10]
    #border_count: [150, 300]

    #early_stopping_rounds: [10]
    #early_stopping_min_delta: [0.0]
    #subsample: [0.7, 0.9, 1.0]

