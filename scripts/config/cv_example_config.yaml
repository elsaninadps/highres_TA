fname_data_parquet: data/training/GLODAPv2023-raw_collocated-{y}.pq
yname_target: talk
xname_features:
- salinity
- temperature
- nitrate
- bottomdepth
num_cv_folds: 5
num_best_models_cohort: 2
save_path: "outputs/model_selection/test_setup"


params:

- model_name: "CatBoost"
  #default_kwargs: { train_dir: models/catboost_cv_train_info }
  param_grid:
    n_estimators: [10, 20, 30]
    depth: [ 5]
    border_count: [ 512 ]
    early_stopping_rounds: [ 20 ]

# - model_name: "LightGBM"
#   param_grid:
#     n_estimators: [ 5, 10]
#     num_leaves: [ 32 ]
#     min_child_samples: [ 10 ]

- model_name: "RandomForest"
  param_grid:
    n_estimators: [ 10, 20, 30 ]
    max_depth: [ 10]
    min_samples_leaf: [ 5 ]
